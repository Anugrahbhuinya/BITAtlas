[pytest]
pythonpath = ../backend ..
testpaths = unit integration e2e security
markers =
    unit: Unit tests validating a single module in isolation
    integration: Integration tests validating interaction between components
    e2e: End-to-end tests validating complete request-response pipelines
    security: Security tests validating security and boundary protections
    performance: Performance benchmarks validating latency and throughput
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
