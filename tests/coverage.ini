[run]
branch = True
source = backend/app
omit =
    *__init__.py
    backend/app/main.py
    backend/app/core/config.py
    backend/app/core/database.py

[report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if __name__ == .__main__.:
    raise AssertionError
    raise NotImplementedError
    pass
    except Exception as e:
    logger.error
    logger.warning
    logger.exception
